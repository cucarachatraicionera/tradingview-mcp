# ═══════════════════════════════════════════════════════════════════════════
#  TradingView Signals Bot — Docker Compose
# ═══════════════════════════════════════════════════════════════════════════
#
# Prerequisites:
#   1. TradingView Desktop running with --remote-debugging-port=9222
#   2. .env file with TELEGRAM_TOKEN and TELEGRAM_CHAT
#
# Usage:
#   docker compose up -d
#   docker compose logs -f
#   docker compose down
#
# Architecture:
#   Container uses host networking to reach TradingView CDP on localhost:9222
#   PM2 manages both signals-bot and dashboard inside the container
#   SQLite database persists in ./data/ via bind mount
#
# ═══════════════════════════════════════════════════════════════════════════

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: tradingview-signals-bot:latest
    container_name: tv-signals-bot

    # Host networking: so the container can reach TradingView CDP on the
    # host's localhost:9222. Required for Linux. On Mac/Windows use
    # extra_hosts instead if Docker Desktop + host.docker.internal.
    network_mode: host

    # Persistent SQLite database
    volumes:
      - ./data:/app/data:delegated

    # Load Telegram credentials from .env
    env_file:
      - .env

    # Environment defaults (override via .env)
    environment:
      CDP_PORT: "${CDP_PORT:-9222}"
      POLL_INTERVAL: "${POLL_INTERVAL:-30}"
      DRY_RUN: "${DRY_RUN:-false}"
      INDICATOR_NAME: "${INDICATOR_NAME:-Neural Matrix Pro [Bot]}"

    # Auto-restart on crash (with backoff via PM2 inside container)
    restart: unless-stopped

    # Graceful shutdown: 10s for PM2 to clean up
    stop_grace_period: 15s

    # Healthcheck: dashboard must respond
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3456/api/stats').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    # Resource limits (adjust based on your system)
    # signals-bot uses ~80MB, dashboard uses ~70MB
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
