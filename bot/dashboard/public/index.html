<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradingView Signals — Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      color: #e2e8f0;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .glass {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .glass-card {
      background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 20px;
      transition: all 0.3s ease;
      overflow: hidden;
    }
    .chart-container { position: relative; height: 220px; width: 100%; }
    .chart-container-sm { position: relative; height: 260px; width: 100%; }
    .glass-card:hover {
      border-color: rgba(255,255,255,0.12);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }
    .glow-green { box-shadow: 0 0 30px rgba(34,197,94,0.15); }
    .glow-red { box-shadow: 0 0 30px rgba(239,68,68,0.15); }
    .glow-blue { box-shadow: 0 0 30px rgba(59,130,246,0.15); }
    .gradient-border {
      position: relative;
    }
    .gradient-border::before {
      content: '';
      position: absolute;
      top: -1px; left: -1px; right: -1px; bottom: -1px;
      border-radius: 21px;
      background: linear-gradient(135deg, rgba(59,130,246,0.3), rgba(139,92,246,0.3), rgba(34,197,94,0.3));
      z-index: -1;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .gradient-border:hover::before { opacity: 1; }
    .animate-in { opacity: 0; transform: translateY(20px); }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .live-dot { animation: pulse-dot 2s ease-in-out infinite; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.02); }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
  </style>
</head>
<body>
  <div class="max-w-7xl mx-auto px-4 py-6">
    <!-- Header -->
    <div class="flex items-center justify-between mb-8 animate-in" id="header">
      <div>
        <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-400 via-purple-400 to-emerald-400 bg-clip-text text-transparent">
          TradingView Signals
        </h1>
        <p class="text-sm text-gray-500 mt-1 flex items-center gap-2">
          <span class="live-dot inline-block w-2 h-2 rounded-full bg-emerald-400"></span>
          Monitoreo en vivo · Multi-Crypto
        </p>
      </div>
      <div class="flex items-center gap-4">
        <span class="text-xs text-gray-600" id="lastUpdate">—</span>
        <button onclick="refresh()" class="px-4 py-2 rounded-xl bg-white/5 hover:bg-white/10 border border-white/10 text-sm transition-all">
          ↻ Refrescar
        </button>
      </div>
    </div>

    <!-- Summary Cards -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6" id="summaryCards"></div>

    <!-- Charts Row -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
      <div class="glass-card p-5 gradient-border animate-in" id="equityChartWrap">
        <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">Curva de Equity</h3>
        <div class="chart-container"><canvas id="equityChart"></canvas></div>
      </div>
      <div class="glass-card p-5 gradient-border animate-in" id="pnlChartWrap">
        <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">P&L por Combo</h3>
        <div class="chart-container"><canvas id="pnlBySymbolChart"></canvas></div>
      </div>
    </div>

    <!-- Per-Combo Cards -->
    <div class="mb-6">
      <h2 class="text-lg font-semibold text-gray-300 mb-3">Rendimiento por Combo</h2>
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="comboCards"></div>
    </div>

    <!-- Win Rate + Distribution -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-6">
      <div class="glass-card p-5 gradient-border animate-in" id="winRateWrap">
        <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">Win Rate</h3>
        <div class="chart-container-sm"><canvas id="winRateChart"></canvas></div>
      </div>
      <div class="glass-card p-5 gradient-border animate-in lg:col-span-2" id="historyWrap">
        <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider mb-3">Historial de Señales</h3>
        <div class="overflow-x-auto">
          <table class="w-full text-sm" id="signalsTable">
            <thead><tr class="text-gray-500 border-b border-white/5">
              <th class="text-left py-2 pr-2">Hora</th>
              <th class="text-left py-2 pr-2">Símbolo</th>
              <th class="text-left py-2 pr-2">Tipo</th>
              <th class="text-right py-2 pr-2">Conf</th>
              <th class="text-right py-2 pr-2">Entrada</th>
              <th class="text-right py-2 pr-2">P&L</th>
              <th class="text-center py-2">Estado</th>
              <th class="text-left py-2">Noticia</th>
            </tr></thead>
            <tbody id="signalsBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    let equityChart, pnlChart, winRateChart;
    let initialized = false;

    function fmtTime(ts) {
      const d = new Date(ts);
      return d.toLocaleString('es-MX', { hour12: false, hour: '2-digit', minute: '2-digit' });
    }

    function fmtPrice(v) { return '$' + Number(v).toLocaleString('en', {minimumFractionDigits:2}); }

    function animateCards() {
      gsap.fromTo('.animate-in',
        { opacity: 0, y: 30 },
        { opacity: 1, y: 0, duration: 0.6, stagger: 0.08, ease: 'power3.out' }
      );
    }
    gsap.fromTo('#header', { opacity: 0, y: -20 }, { opacity: 1, y: 0, duration: 0.5, ease: 'power2.out' });

    function renderSummary(stats) {
      const el = document.getElementById('summaryCards');
      if (!initialized) {
        const cards = [
          { label: 'Total Señales', value: stats.total, color: 'text-blue-400', icon: '📊', key: 'total' },
          { label: 'Ganadas', value: stats.won, color: 'text-emerald-400', icon: '✅', key: 'won' },
          { label: 'Perdidas', value: stats.lost, color: 'text-red-400', icon: '❌', key: 'lost' },
          { label: 'P&L Total', value: (stats.totalPnl > 0 ? '+' : '') + stats.totalPnl, color: stats.totalPnl >= 0 ? 'text-emerald-400' : 'text-red-400', icon: '💰', key: 'pnl' },
        ];
        el.innerHTML = cards.map(c => `
          <div class="glass-card p-5 gradient-border text-center" data-key="${c.key}">
            <div class="text-2xl mb-1">${c.icon}</div>
            <div class="text-2xl font-bold ${c.color}" data-value="${c.key}">${c.value}</div>
            <div class="text-xs text-gray-500 mt-1">${c.label}</div>
          </div>
        `).join('');
      } else {
        const cards = el.querySelectorAll('[data-value]');
        const vals = [stats.total, stats.won, stats.lost, (stats.totalPnl > 0 ? '+' : '') + stats.totalPnl];
        cards.forEach((el, i) => {
          const cls = i === 3 ? (stats.totalPnl >= 0 ? 'text-emerald-400' : 'text-red-400') : 'text-blue-400';
          el.className = 'text-2xl font-bold ' + cls;
          el.textContent = vals[i];
        });
      }
    }

    function renderComboCards(stats) {
      const el = document.getElementById('comboCards');
      const combos = stats.byCombo && stats.byCombo.length ? stats.byCombo : [];
      const allCombos = [
        { symbol: 'XAUUSD', tf: '30m' }, { symbol: 'XAUUSD', tf: '1h' }, { symbol: 'XAUUSD', tf: '4h' },
        { symbol: 'SOLUSD', tf: '30m' }, { symbol: 'SOLUSD', tf: '1h' }, { symbol: 'SOLUSD', tf: '4h' },
      ];
      const merged = allCombos.map(c => {
        const found = combos.find(x => x.symbol === c.symbol && x.tf === c.tf);
        return found || { symbol: c.symbol, tf: c.tf, total: 0, won: 0, lost: 0, pnl: 0 };
      });
      if (!initialized) {
        el.innerHTML = merged.map((c, i) => {
          const pnl = Number(c.pnl);
          const resolved = (c.won || 0) + (c.lost || 0);
          const wr = resolved > 0 ? ((c.won / resolved) * 100).toFixed(0) : '—';
          return `
            <div class="glass-card p-5 gradient-border" data-combo="${i}">
              <div class="flex items-center justify-between mb-3">
                <span class="font-bold text-lg">${c.symbol} <span class="text-sm font-normal text-gray-400">${c.tf}</span></span>
                <span class="text-xs px-2 py-0.5 rounded-full pnl-badge ${pnl >= 0 ? 'bg-emerald-500/10 text-emerald-400' : 'bg-red-500/10 text-red-400'}">
                  ${pnl >= 0 ? '+' : ''}${pnl.toFixed(2)}
                </span>
              </div>
              <div class="grid grid-cols-3 gap-2 text-center text-xs">
                <div><div class="text-lg font-semibold text-gray-200 total-val">${c.total}</div><div class="text-gray-500">Señales</div></div>
                <div><div class="text-lg font-semibold text-emerald-400 won-val">${c.won || 0}</div><div class="text-gray-500">Ganadas</div></div>
                <div><div class="text-lg font-semibold text-red-400 lost-val">${c.lost || 0}</div><div class="text-gray-500">Perdidas</div></div>
              </div>
              <div class="mt-3 pt-3 border-t border-white/5 text-center">
                <span class="text-sm font-medium wr-label ${resolved > 0 ? 'text-blue-400' : 'text-gray-600'}">WR: ${wr}${resolved > 0 ? '%' : ''}</span>
              </div>
            </div>
          `;
        }).join('');
      } else {
        merged.forEach((c, i) => {
          const card = el.querySelector(`[data-combo="${i}"]`);
          if (!card) return;
          const pnl = Number(c.pnl);
          const resolved = (c.won || 0) + (c.lost || 0);
          const wr = resolved > 0 ? ((c.won / resolved) * 100).toFixed(0) : '—';
          card.querySelector('.pnl-badge').textContent = (pnl >= 0 ? '+' : '') + pnl.toFixed(2);
          card.querySelector('.pnl-badge').className = `text-xs px-2 py-0.5 rounded-full pnl-badge ${pnl >= 0 ? 'bg-emerald-500/10 text-emerald-400' : 'bg-red-500/10 text-red-400'}`;
          card.querySelector('.total-val').textContent = c.total;
          card.querySelector('.won-val').textContent = c.won || 0;
          card.querySelector('.lost-val').textContent = c.lost || 0;
          const wrLabel = card.querySelector('.wr-label');
          wrLabel.textContent = `WR: ${wr}${resolved > 0 ? '%' : ''}`;
          wrLabel.className = `text-sm font-medium wr-label ${resolved > 0 ? 'text-blue-400' : 'text-gray-600'}`;
        });
      }
    }

    function renderSignalsTable(signals) {
      const tbody = document.getElementById('signalsBody');
      if (!signals || !signals.length) {
        tbody.innerHTML = '<tr><td colspan="8" class="text-center py-8 text-gray-600">No hay señales aún</td></tr>';
        return;
      }
      const rows = signals.slice(0, 25).map(s => {
        const statusColors = { pending: 'text-yellow-400', open: 'text-blue-400', won: 'text-emerald-400', lost: 'text-red-400', closed: 'text-gray-400' };
        const statusLabels = { pending: '⏳ Pendiente', open: '📡 Abierta', won: '✅ Ganada', lost: '❌ Perdida', closed: '🔒 Cerrada' };
        const pnl = s.pnl !== null && s.pnl !== undefined;
        const sentimentEmoji = s.news_sentiment === 'positive' ? '🟢' : s.news_sentiment === 'negative' ? '🔴' : '⚪';
        const newsTitle = s.news_headline ? s.news_headline.substring(0, 50) + (s.news_headline.length > 50 ? '…' : '') : '—';
        const hasNewsLink = s.news_url && !s.news_url.includes('tradingview.com/symbols');
        return `<tr class="border-b border-white/5 hover:bg-white/5 transition-colors">
          <td class="py-2 pr-2 text-gray-400 text-xs">${fmtTime(s.timestamp)}</td>
          <td class="py-2 pr-2 font-medium text-xs">${s.symbol}${s.tf ? ' ' + s.tf : ''}</td>
          <td class="py-2 pr-2 text-xs">${s.signal_type === 'LONG' ? '🟢' : '🔴'}</td>
          <td class="py-2 pr-2 text-right text-xs">${s.confidence || '—'}</td>
          <td class="py-2 pr-2 text-right text-xs">${fmtPrice(s.entry_price)}</td>
          <td class="py-2 pr-2 text-right text-xs ${pnl ? (s.pnl >= 0 ? 'text-emerald-400' : 'text-red-400') : 'text-gray-600'}">${pnl ? (s.pnl >= 0 ? '+' : '') + s.pnl.toFixed(2) : '—'}</td>
          <td class="py-2 text-center"><span class="text-xs ${statusColors[s.status] || 'text-gray-400'}">${statusLabels[s.status] || s.status}</span></td>
          <td class="py-2 pl-2 text-xs text-gray-400 truncate max-w-[120px]">${sentimentEmoji} ${newsTitle}</td>
        </tr>`;
      }).join('');
      tbody.innerHTML = rows;
    }

    function updateCharts(stats) {
      // Equity curve
      const eq = stats.equityCurve || [];
      if (equityChart) equityChart.destroy();
      const eqCtx = document.getElementById('equityChart').getContext('2d');
      const eqLabels = eq.map(e => e.timestamp);
      const eqData = eq.map(e => e.equity);
      const eqColor = eqData.length > 0 && eqData[eqData.length-1] >= eqData[0] ? '#22c55e' : '#ef4444';
      equityChart = new Chart(eqCtx, {
        type: 'line',
        data: {
          labels: eqLabels,
          datasets: [{
            label: 'Equity', data: eqData,
            borderColor: eqColor, backgroundColor: eqColor + '20',
            fill: true, tension: 0.4, pointRadius: 0,
            borderWidth: 2,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: '#6b7280', maxTicksLimit: 8, callback: v => { const d = new Date(v); return d.toLocaleDateString('es-MX', {month:'short', day:'numeric', hour:'2-digit'}); } } },
            y: {
              grid: { color: 'rgba(255,255,255,0.03)' },
              ticks: { color: '#6b7280', callback: v => '$' + v }
            }
          }
        }
      });

      // P&L by combo
      const symData = stats.byCombo && stats.byCombo.length ? stats.byCombo : (stats.bySymbol || []);
      if (pnlChart) pnlChart.destroy();
      const pnlCtx = document.getElementById('pnlBySymbolChart').getContext('2d');
      const symLabels = symData.map(s => s.tf ? s.symbol + ' ' + s.tf : s.symbol);
      const symPnl = symData.map(s => Number(s.pnl));
      const symColors = symPnl.map(v => v >= 0 ? '#22c55e' : '#ef4444');
      pnlChart = new Chart(pnlCtx, {
        type: 'bar',
        data: {
          labels: symLabels,
          datasets: [{
            label: 'P&L', data: symPnl,
            backgroundColor: symColors,
            borderRadius: 6, borderSkipped: false,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: '#9ca3af' }, grid: { display: false } },
            y: { grid: { color: 'rgba(255,255,255,0.03)' }, ticks: { color: '#6b7280', callback: v => '$' + v } }
          }
        }
      });

      // Win Rate doughnut
      const total = stats.won + stats.lost;
      if (winRateChart) winRateChart.destroy();
      const wrCtx = document.getElementById('winRateChart').getContext('2d');
      winRateChart = new Chart(wrCtx, {
        type: 'doughnut',
        data: {
          labels: ['Ganadas', 'Perdidas'],
          datasets: [{
            data: [stats.won, stats.lost],
            backgroundColor: ['#22c55e', '#ef4444'],
            borderWidth: 0,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          cutout: '70%',
          plugins: {
            legend: {
              position: 'bottom',
              labels: { color: '#9ca3af', padding: 16, font: { size: 12 } }
            }
          }
        },
        plugins: [{
          id: 'centerText',
          beforeDraw: function(chart) {
            const {width, height, ctx} = chart;
            ctx.save();
            ctx.font = '600 28px Inter, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#e2e8f0';
            ctx.fillText((stats.winRate || 0) + '%', width/2, height/2 - 10);
            ctx.font = '12px Inter, sans-serif';
            ctx.fillStyle = '#6b7280';
            ctx.fillText('Win Rate', width/2, height/2 + 18);
            ctx.restore();
          }
        }]
      });
    }

    async function refresh() {
      try {
        document.getElementById('lastUpdate').textContent = 'Actualizando...';
        const resp = await fetch('/api/stats');
        const stats = await resp.json();
        const sigResp = await fetch('/api/signals?limit=20');
        const signals = await sigResp.json();

        renderSummary(stats);
        renderComboCards(stats);
        renderSignalsTable(signals);
        updateCharts(stats);

        if (!initialized) {
          initialized = true;
          animateCards();
        }
        document.getElementById('lastUpdate').textContent = 'Última actualización: ' + new Date().toLocaleTimeString('es-MX');
      } catch(e) {
        document.getElementById('lastUpdate').textContent = 'Error al cargar datos';
        console.error(e);
      }
    }

    refresh();
    setInterval(refresh, 10000);
  </script>
</body>
</html>
